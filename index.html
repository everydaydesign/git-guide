<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Guide to Git</title>
    <link rel="stylesheet" href="assets/css/style.css?v=20" />
    <script>
      (function () {
        try {
          document.documentElement.dataset.theme = localStorage.getItem("theme") || "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <main class="picker">
      <div>
        <h1 class="picker-title">Guide to Git</h1>
        <p class="picker-sub">Choose language and format</p>
      </div>

      <div class="picker-langs">
        <section class="picker-lang">
          <div class="picker-lang-head">
            <span class="picker-lang-flag">🇸🇪</span>
            <span class="picker-lang-name" lang="sv">Svenska</span>
          </div>
          <div class="picker-formats">
            <a class="picker-format" href="languages/sv/">
              <span class="picker-format-icon"
                ><svg
                  width="22"
                  height="22"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#533afd"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"></path>
                  <circle cx="12" cy="12" r="3"></circle></svg
              ></span>
              <span class="picker-format-label">Visual guide</span>
              <span class="picker-format-hint">layout &amp; diagrams</span>
            </a>
            <a
              class="picker-format"
              href="https://github.com/everydaydesign/git-guide/blob/main/docs/GUIDE_GIT_SV.md"
            >
              <span class="picker-format-icon"
                ><svg
                  width="22"
                  height="22"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#533afd"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <path d="M14 2v6h6"></path>
                  <path d="M16 13H8"></path>
                  <path d="M16 17H8"></path>
                  <path d="M10 9H8"></path></svg
              ></span>
              <span class="picker-format-label">Text-based</span>
              <span class="picker-format-hint">plain markdown</span>
            </a>
          </div>
        </section>

        <div class="picker-divider"></div>

        <section class="picker-lang">
          <div class="picker-lang-head">
            <span class="picker-lang-flag">🇺🇸</span>
            <span class="picker-lang-name">English</span>
          </div>
          <div class="picker-formats">
            <a class="picker-format" href="languages/en/">
              <span class="picker-format-icon"
                ><svg
                  width="22"
                  height="22"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#533afd"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"></path>
                  <circle cx="12" cy="12" r="3"></circle></svg
              ></span>
              <span class="picker-format-label">Visual guide</span>
              <span class="picker-format-hint">layout &amp; diagrams</span>
            </a>
            <a
              class="picker-format"
              href="https://github.com/everydaydesign/git-guide/blob/main/docs/GUIDE_GIT_EN.md"
            >
              <span class="picker-format-icon"
                ><svg
                  width="22"
                  height="22"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#533afd"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <path d="M14 2v6h6"></path>
                  <path d="M16 13H8"></path>
                  <path d="M16 17H8"></path>
                  <path d="M10 9H8"></path></svg
              ></span>
              <span class="picker-format-label">Text-based</span>
              <span class="picker-format-hint">plain markdown</span>
            </a>
          </div>
        </section>
      </div>
      <footer class="picker-footer">
        © 2026 Montathar Faraon · Licensed under the
        <a href="https://github.com/everydaydesign/git-guide/blob/main/LICENSE">MIT License</a>
      </footer>
    </main>
  </body>
</html>
